<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GrupResumo · Configuração</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --panel-2: #273449;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-hover: #0ea5e9;
        --ok: #22c55e;
        --err: #ef4444;
        --border: #334155;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        padding: 24px 32px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--panel);
      }
      h1 { margin: 0; font-size: 20px; }
      h2 { margin: 0 0 16px; font-size: 16px; color: var(--accent); }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px;
        display: grid;
        gap: 20px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .grid.full { grid-template-columns: 1fr; }
      label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      input, textarea, select {
        width: 100%;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
      }
      input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--accent);
      }
      textarea { min-height: 80px; resize: vertical; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        background: var(--accent);
        color: #0b1220;
        border: none;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: var(--accent-hover); }
      button.ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--ok);
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }
      .toast.show { opacity: 1; }
      .toast.error { background: var(--err); }
      details summary {
        cursor: pointer;
        font-weight: 500;
        margin-bottom: 12px;
      }
      .row-test {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .row-test input { flex: 1; }
    </style>
  </head>
  <body>
    <header>
      <h1>GrupResumo · Configuração</h1>
      <span id="status" class="hint">carregando…</span>
    </header>

    <main>
      <form id="form">
        <div class="card">
          <h2>WhatsApp (Evolution API)</h2>
          <div class="grid">
            <div>
              <label>URL da Evolution</label>
              <input name="evolution.url" placeholder="https://sua-evolution.com" />
            </div>
            <div>
              <label>Instância</label>
              <input name="evolution.instance" placeholder="nome_da_instancia" />
            </div>
            <div>
              <label>API Key</label>
              <input name="evolution.apiKey" type="password" placeholder="••••••••" />
              <div class="hint">Deixe em branco para manter a chave salva.</div>
            </div>
            <div>
              <label>Grupos (IDs separados por vírgula)</label>
              <textarea name="evolution.groups" placeholder="1203630xxxxx@g.us, ..."></textarea>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Telegram</h2>
          <div class="grid">
            <div>
              <label>Bot Token</label>
              <input name="telegram.token" type="password" placeholder="••••••••" />
            </div>
            <div>
              <label>Grupos (chat IDs separados por vírgula)</label>
              <textarea name="telegram.groups" placeholder="-1001234567890, ..."></textarea>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Anthropic (resumo IA)</h2>
          <div class="grid">
            <div>
              <label>API Key</label>
              <input name="anthropic.apiKey" type="password" placeholder="••••••••" />
            </div>
            <div>
              <label>Modelo</label>
              <input name="anthropic.model" value="claude-opus-4-7" />
            </div>
          </div>
        </div>

        <div class="card">
          <h2>ElevenLabs (áudio)</h2>
          <div class="grid">
            <div>
              <label>API Key</label>
              <input name="elevenlabs.apiKey" type="password" placeholder="••••••••" />
            </div>
            <div>
              <label>Voice ID</label>
              <input name="elevenlabs.voiceId" />
            </div>
            <div>
              <label>Modelo</label>
              <input name="elevenlabs.model" value="eleven_multilingual_v2" />
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Agendamento</h2>
          <div class="grid">
            <div>
              <label>Cron</label>
              <input name="scheduler.cron" value="0 20 * * *" />
              <div class="hint">Padrão: todo dia às 20h. Ver crontab.guru</div>
            </div>
            <div>
              <label>Timezone</label>
              <input name="scheduler.timezone" value="America/Sao_Paulo" />
            </div>
            <div>
              <label>Janela de mensagens (horas)</label>
              <input name="scheduler.windowHours" type="number" min="1" value="24" />
            </div>
          </div>
        </div>

        <div class="card">
          <div class="actions">
            <button type="submit">Salvar configurações</button>
            <button type="button" class="ghost" id="reload">Recarregar</button>
          </div>
        </div>
      </form>

      <div class="card">
        <h2>Disparo manual</h2>
        <p class="hint">Roda o pipeline (resumo + áudio) imediatamente para um grupo.</p>
        <div class="grid">
          <div>
            <label>Plataforma</label>
            <select id="run-platform">
              <option value="whatsapp">WhatsApp</option>
              <option value="telegram">Telegram</option>
            </select>
          </div>
          <div>
            <label>Group ID</label>
            <input id="run-group" placeholder="...@g.us ou -100..." />
          </div>
          <div>
            <label>Janela (horas)</label>
            <input id="run-window" type="number" min="1" value="24" />
          </div>
          <div style="display: flex; align-items: end;">
            <button type="button" id="run-btn">Rodar agora</button>
          </div>
        </div>
      </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
      const form = document.getElementById('form');
      const statusEl = document.getElementById('status');
      const toast = document.getElementById('toast');

      function showToast(msg, isError = false) {
        toast.textContent = msg;
        toast.classList.toggle('error', isError);
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      }

      function setNested(obj, path, value) {
        const parts = path.split('.');
        let cur = obj;
        for (let i = 0; i < parts.length - 1; i++) {
          cur[parts[i]] = cur[parts[i]] ?? {};
          cur = cur[parts[i]];
        }
        cur[parts[parts.length - 1]] = value;
      }

      function getNested(obj, path) {
        return path.split('.').reduce((o, k) => (o ? o[k] : undefined), obj);
      }

      async function load() {
        statusEl.textContent = 'carregando…';
        const r = await fetch('/api/settings');
        const data = await r.json();
        for (const el of form.elements) {
          if (!el.name) continue;
          const val = getNested(data, el.name);
          if (val == null) continue;
          if (Array.isArray(val)) el.value = val.join(', ');
          else if (el.type === 'password') el.placeholder = val ? `atual: ${val}` : '••••••••';
          else el.value = val;
        }
        statusEl.textContent = 'carregado';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const patch = {};
        for (const el of form.elements) {
          if (!el.name) continue;
          let value = el.value;
          if (el.name.endsWith('.groups')) {
            value = value.split(',').map((s) => s.trim()).filter(Boolean);
            if (el.name === 'telegram.groups') value = value.map(Number).filter((n) => !Number.isNaN(n));
          } else if (el.type === 'number') {
            value = Number(value);
          }
          if (el.type === 'password' && !value) continue;
          setNested(patch, el.name, value);
        }
        const r = await fetch('/api/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch),
        });
        if (r.ok) {
          showToast('Configurações salvas');
          load();
        } else {
          const err = await r.json().catch(() => ({}));
          showToast('Erro: ' + (err.error || r.status), true);
        }
      });

      document.getElementById('reload').addEventListener('click', load);

      document.getElementById('run-btn').addEventListener('click', async () => {
        const platform = document.getElementById('run-platform').value;
        const groupId = document.getElementById('run-group').value.trim();
        const windowHours = Number(document.getElementById('run-window').value);
        if (!groupId) return showToast('informe o Group ID', true);
        showToast('rodando pipeline…');
        const r = await fetch('/summary/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform, groupId, windowHours }),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok && data.ok) {
          showToast(`OK · ${data.messageCount ?? 0} mensagens resumidas`);
        } else {
          showToast('Falha: ' + (data.reason || data.error || r.status), true);
        }
      });

      load();
    </script>
  </body>
</html>
